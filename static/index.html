<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CAS Vision Interface</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            asciimath: {
                delimiters: [['`', '`']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-am-chtml.js">
        </script>
</head>

<body>
    <div class="container">
        <h2>Differential Equation Solver</h2>

        <form id="upload-form">
            <input type="file" id="equation-image" accept="image/png, image/jpeg" required>
            <button type="submit">Analyze & Solve</button>
        </form>

        <div id="status"></div>
        <div id="output-box" class="hidden">
            <h3>Extracted LaTeX:</h3>
            <div id="latex-text" class="math-display"></div>

            <h3>Parsed CAS String:</h3>
            <div id="cas-text" class="math-display"></div>

            <h3>Analytical Solution:</h3>
            <div id="solution-text" class="math-display"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
